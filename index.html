            <div id="timer-text" class="hidden">Генерация... Осталось секунд: <span id="seconds-left">0</span></div>

    <script>
        const title = document.getElementById('main-title');

        fetch(`https://countapi.xyz{siteKey}/total`).catch(() => {});

        fetch(`https://countapi.xyz{siteKey}/day_${todayDate}`).catch(() => {});

                if (inputHash === "0b3337996c561bcfdf160352efdf8bda") {
                    alert("Доступ разрешен. Данные обновлены.");

                    // Получаем просмотры за сегодня
                    fetch(`https://countapi.xyz{siteKey}/day_${todayDate}`)
                        .then(res => res.json())
                        .then(data => { statToday.textContent = data.value || 1; })
                        .catch(() => { statToday.textContent = "1 (Локально)"; });

                    fetch(`https://countapi.xyz{siteKey}/total`)
                        .then(res => res.json())
                        .then(data => { statTotal.textContent = data.value || 1; })
                        .catch(() => { statTotal.textContent = "1 (Локально)"; });

                    adminBlock.classList.remove('hidden'); // Показываем админку на экране
                } else {
                    alert("Неверный пароль! Доступ заблокирован.");
                }
            }
        };
